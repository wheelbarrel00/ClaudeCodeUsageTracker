name: Publish Extension

# Triggers when you push a version tag, e.g.  git tag v1.0.3 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    # Secrets are mapped to env so the steps below can self-skip when a token is absent.
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --out extension.vsix

      # Open VSX (the registry Cursor uses). Runs only if OVSX_PAT is set.
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx --yes ovsx publish extension.vsix -p "$OVSX_PAT"

      # VS Code Marketplace. Runs only if VSCE_PAT is set (needs the Azure PAT).
      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: npx --yes @vscode/vsce publish --packagePath extension.vsix -p "$VSCE_PAT"
